<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Cinema Seat Picker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #050508;
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #wrap {
            position: relative;
            width: 100vw;
            height: 100vh
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab
        }

        #c:active {
            cursor: grabbing
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .glass-panel {
            background: rgba(12, 12, 18, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .pointer-auto {
            pointer-events: auto;
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Custom Select Dropdown */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%22//www.w3.org/2000/svg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.4-12.8z%22/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right .7rem top 50%;
            background-size: .65rem auto;
        }

        /* Play Overlay */
        #playoverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            cursor: pointer;
            gap: 16px;
            backdrop-filter: blur(5px);
            transition: opacity 0.4s;
        }

        .play-btn {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #playoverlay:hover .play-btn {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.6);
        }
    </style>
</head>

<body>
    <div id="wrap">
        <canvas id="c"></canvas>

        <div id="playoverlay">
            <div
                class="play-btn w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.5)]">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
                    <polygon points="6,3 20,12 6,21" />
                </svg>
            </div>
            <p class="text-white/70 text-sm tracking-wider uppercase font-medium">Click to Start Cinema Experience</p>
        </div>

        <div id="ui" class="p-4 sm:p-6">
            <!-- Top Bar -->
            <div
                class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pointer-events-none">
                <div class="flex items-center gap-4">
                    <h1
                        class="text-white font-['Bebas_Neue'] text-3xl sm:text-4xl tracking-widest text-glow drop-shadow-lg">
                        CINEPICKER</h1>
                    <div id="modeLabel"
                        class="glass-panel text-white/80 text-xs px-3 py-1 rounded-full uppercase tracking-widest font-semibold border border-white/20 transition-all">
                        OVERVIEW
                    </div>
                </div>

                <div class="pointer-auto flex gap-3 w-full sm:w-auto">
                    <select id="formatSelect"
                        class="glass-panel text-white text-sm px-4 py-2.5 pr-10 rounded-xl cursor-pointer hover:bg-white/10 transition-colors w-full sm:w-auto focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="standard">Standard 2D/3D</option>
                        <option value="imax">IMAX Digital/Laser</option>
                        <option value="luxury">Luxury (Insignia/Luxe)</option>
                        <option value="fdx">4DX Motion</option>
                        <option value="screenx">ScreenX (270°)</option>
                    </select>
                    <button id="backbtn"
                        class="glass-panel text-white text-sm px-5 py-2.5 rounded-xl cursor-pointer hover:bg-white/10 transition-colors hidden font-medium">
                        ← Back to Theater
                    </button>
                </div>
            </div>

            <!-- Format Info -->
            <div class="flex-1 relative pointer-events-none">
                <div class="absolute top-4 left-0">
                    <div id="fmtBadge"
                        class="inline-block bg-blue-600/20 border border-blue-500/40 text-blue-400 text-xs font-bold px-4 py-1.5 rounded-full tracking-widest mb-2 transition-colors">
                        STANDARD
                    </div>
                    <div id="fmtInfo"
                        class="text-white/50 text-xs tracking-wide leading-relaxed max-w-xs transition-opacity">
                        Loading format data...
                    </div>
                </div>

                <div id="hint"
                    class="absolute bottom-6 left-1/2 -translate-x-1/2 glass-panel text-white/70 text-xs px-6 py-2.5 rounded-full tracking-wider whitespace-nowrap transition-opacity duration-700">
                    Drag to rotate · Scroll to zoom · Click a seat
                </div>
            </div>

            <!-- Selection Panel -->
            <div id="selpanel"
                class="absolute bottom-6 left-1/2 -translate-x-1/2 glass-panel p-5 rounded-2xl hidden pointer-auto w-80 shadow-2xl transform transition-transform border border-white/20 bg-[#0a0a0f]/95">
                <div class="text-white/40 text-[10px] tracking-[0.2em] font-semibold mb-1">SELECTED SEAT</div>
                <div id="seltext" class="font-['Bebas_Neue'] text-3xl text-white tracking-wide mb-4 text-glow">ROW A,
                    SEAT 1</div>

                <div class="grid grid-cols-3 gap-2 mb-4">
                    <div class="bg-white/5 rounded-lg p-2 text-center">
                        <strong id="si-dist" class="block text-white text-sm font-semibold mb-0.5">—</strong>
                        <span class="text-white/40 text-[9px] uppercase tracking-wider">Distance</span>
                    </div>
                    <div class="bg-white/5 rounded-lg p-2 text-center">
                        <strong id="si-angle" class="block text-white text-sm font-semibold mb-0.5">—</strong>
                        <span class="text-white/40 text-[9px] uppercase tracking-wider">Angle</span>
                    </div>
                    <div class="bg-white/5 rounded-lg p-2 text-center">
                        <strong id="si-tier" class="block text-white text-sm font-semibold mb-0.5">—</strong>
                        <span class="text-white/40 text-[9px] uppercase tracking-wider">Tier</span>
                    </div>
                </div>

                <button id="btnview"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm py-3 rounded-xl transition-all shadow-[0_0_15px_rgba(37,99,235,0.4)] hover:shadow-[0_0_25px_rgba(37,99,235,0.6)]">
                    Enter Seat View
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const FORMATS = {
            standard: {
                id: 'standard', name: 'Standard 2D/3D',
                rows: 12, cols: 22,
                screenW: 24, screenH: 10,
                isImax: false, isScreenX: false, isLuxury: false, is4DX: false,
                colorTheme: { seat: 0x1e3a8a, ambient: 0xffffff, lightInt: 0.8 }, // Blue seats
                desc: '264 Seats · 45 ft Flat Screen · Standard stadium raking.',
                badgeClass: 'bg-blue-600/20 border-blue-500/40 text-blue-400'
            },
            imax: {
                id: 'imax', name: 'IMAX Digital/Laser',
                rows: 14, cols: 32,
                screenW: 36, screenH: 19, // Massive curved 1.90:1
                isImax: true, isScreenX: false, isLuxury: false, is4DX: false,
                colorTheme: { seat: 0x111111, ambient: 0xe0f2fe, lightInt: 1.0 }, // Black leather
                desc: '448 Seats · 72 ft Curved Screen · Steep pitch · Ceiling removed.',
                badgeClass: 'bg-cyan-600/20 border-cyan-500/40 text-cyan-400'
            },
            luxury: {
                id: 'luxury', name: 'Luxury (Insignia/Luxe)',
                rows: 5, cols: 12,
                screenW: 16, screenH: 7, // Smaller intimate screen
                isImax: false, isScreenX: false, isLuxury: true, is4DX: false,
                colorTheme: { seat: 0x452b17, ambient: 0xf59e0b, lightInt: 0.5 }, // Brown leather, amber lights
                desc: '60 Seats · 30 ft Screen · Recliners & Tray Tables · Massive legroom.',
                badgeClass: 'bg-amber-600/20 border-amber-500/40 text-amber-400'
            },
            fdx: {
                id: 'fdx', name: '4DX Motion',
                rows: 8, cols: 16,
                screenW: 20, screenH: 8.5,
                isImax: false, isScreenX: false, isLuxury: false, is4DX: true,
                colorTheme: { seat: 0x991b1b, ambient: 0xff0000, lightInt: 0.4 }, // Red seats, red ambient
                desc: '128 Seats · 40 ft Screen · Grouped in mechanical motion blocks of 4.',
                badgeClass: 'bg-red-600/20 border-red-500/40 text-red-400'
            },
            screenx: {
                id: 'screenx', name: 'ScreenX (270°)',
                rows: 10, cols: 20,
                screenW: 20, screenH: 8.5,
                isImax: false, isScreenX: true, isLuxury: false, is4DX: false,
                colorTheme: { seat: 0x1e293b, ambient: 0xffffff, lightInt: 0.6 }, // Slate seats
                desc: '200 Seats · 270° U-shaped panoramic projection across side walls.',
                badgeClass: 'bg-purple-600/20 border-purple-500/40 text-purple-400'
            }
        };

        const canvas = document.getElementById('c');
        let W = window.innerWidth, H = window.innerHeight;
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
        renderer.setSize(W, H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        scene.fog = new THREE.Fog(0x050508, 10, 60);

        const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 150);
        // Camera physics variables (crucial for smooth gliding)
        let targetCamPos = new THREE.Vector3(0, 15, 25);
        let targetCamLook = new THREE.Vector3(0, 5, -10);

        window.addEventListener('resize', () => {
            W = window.innerWidth; H = window.innerHeight;
            renderer.setSize(W, H);
            camera.aspect = W / H;
            camera.updateProjectionMatrix();
        });

        // Lighting setup
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const screenGlow = new THREE.PointLight(0xffffff, 1.5, 30);
        screenGlow.position.set(0, 5, -8);
        scene.add(screenGlow);

        const matCache = {
            floor: new THREE.MeshStandardMaterial({ color: 0x111116, roughness: 0.9 }),
            wall: new THREE.MeshStandardMaterial({ color: 0x0a0a0f, roughness: 1.0 }),
            ceiling: new THREE.MeshStandardMaterial({ color: 0x050508, roughness: 1.0 })
        };

        let roomGroup = new THREE.Group();
        scene.add(roomGroup);

        // Widened room to prevent screen clipping
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), matCache.floor);
        floor.rotation.x = -Math.PI / 2; floor.position.y = 0; floor.receiveShadow = true;
        roomGroup.add(floor);

        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), matCache.ceiling);
        ceiling.rotation.x = Math.PI / 2; ceiling.position.y = 22; // High roof
        roomGroup.add(ceiling);

        const wallL = new THREE.Mesh(new THREE.PlaneGeometry(80, 40), matCache.wall);
        wallL.rotation.y = Math.PI / 2; wallL.position.set(-35, 15, 0);
        roomGroup.add(wallL);

        const wallR = new THREE.Mesh(new THREE.PlaneGeometry(80, 40), matCache.wall);
        wallR.rotation.y = -Math.PI / 2; wallR.position.set(35, 15, 0);
        roomGroup.add(wallR);

        const wallB = new THREE.Mesh(new THREE.PlaneGeometry(80, 40), matCache.wall);
        wallB.position.set(0, 15, -20);
        roomGroup.add(wallB);

        let vt = null;
        const videoEl = document.createElement('video');
        videoEl.crossOrigin = 'anonymous';
        videoEl.src = 'https://res.cloudinary.com/dtqpztniu/video/upload/v1778613522/Dune__Part_Three___Official_Teaser_Trailer_hhdcdu.mp4';
        videoEl.loop = true; videoEl.muted = true; videoEl.playsInline = true;

        function startVideo() {
            if (!videoEl.paused) return;
            videoEl.play().then(() => {
                if (!vt) {
                    vt = new THREE.VideoTexture(videoEl);
                    vt.minFilter = THREE.LinearFilter;
                    vt.magFilter = THREE.LinearFilter;
                    vt.format = THREE.RGBFormat;
                }
                applyVideoToScreens();
                document.getElementById('playoverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('playoverlay').style.display = 'none', 400);
            }).catch(e => console.log("Autoplay prevented"));
        }
        document.getElementById('playoverlay').addEventListener('click', startVideo);

        let dynamicMeshes = [];
        let scrCenterMesh = null, scrLeftMesh = null, scrRightMesh = null;

        function cleanupDynamicMeshes() {
            dynamicMeshes.forEach(mesh => {
                scene.remove(mesh);
                if (mesh.geometry) mesh.geometry.dispose();
                if (mesh.material) {
                    if (Array.isArray(mesh.material)) mesh.material.forEach(m => m.dispose());
                    else mesh.material.dispose();
                }
            });
            dynamicMeshes = [];
            scrCenterMesh = scrLeftMesh = scrRightMesh = null;
        }

        function buildScreen(fmt) {
            const zPos = -14;
            const yPos = fmt.screenH / 2 + 1.5;
            const baseMat = new THREE.MeshBasicMaterial({ color: 0x222222 });

            if (fmt.isImax) {
                // IMAX Curved Screen
                const radius = 28;
                const theta = fmt.screenW / radius;
                const geo = new THREE.CylinderGeometry(radius, radius, fmt.screenH, 32, 1, true, -theta / 2 + Math.PI / 2, theta);
                scrCenterMesh = new THREE.Mesh(geo, baseMat);
                scrCenterMesh.position.set(0, yPos, zPos + radius - 2);
                scrCenterMesh.rotation.y = -Math.PI / 2;
                geo.scale(-1, 1, 1); // Reverse for inner view
                scene.add(scrCenterMesh);
                dynamicMeshes.push(scrCenterMesh);
                ceiling.visible = false; // Remove roof for IMAX
            } else {
                ceiling.visible = true;
                // Flat Screen
                const geo = new THREE.PlaneGeometry(fmt.screenW, fmt.screenH);
                scrCenterMesh = new THREE.Mesh(geo, baseMat);
                scrCenterMesh.position.set(0, yPos, zPos);
                scene.add(scrCenterMesh);
                dynamicMeshes.push(scrCenterMesh);

                // ScreenX Side Walls
                if (fmt.isScreenX) {
                    const sideW = 20;
                    const sideGeo = new THREE.PlaneGeometry(sideW, fmt.screenH);

                    scrLeftMesh = new THREE.Mesh(sideGeo, baseMat);
                    scrLeftMesh.position.set(-fmt.screenW / 2, yPos, zPos + sideW / 2);
                    scrLeftMesh.rotation.y = Math.PI / 2;
                    scene.add(scrLeftMesh); dynamicMeshes.push(scrLeftMesh);

                    scrRightMesh = new THREE.Mesh(sideGeo, baseMat);
                    scrRightMesh.position.set(fmt.screenW / 2, yPos, zPos + sideW / 2);
                    scrRightMesh.rotation.y = -Math.PI / 2;
                    scene.add(scrRightMesh); dynamicMeshes.push(scrRightMesh);
                }
            }
        }

        function applyVideoToScreens() {
            if (!vt || !scrCenterMesh) return;
            const vidMat = new THREE.MeshBasicMaterial({ map: vt, side: THREE.DoubleSide });
            if (scrCenterMesh) scrCenterMesh.material = vidMat;
            if (scrLeftMesh) scrLeftMesh.material = vidMat;
            if (scrRightMesh) scrRightMesh.material = vidMat;
        }

        let seatGroups = [];
        let currentFmt = FORMATS.standard;

        function buildSeats(fmt) {
            seatGroups = [];
            const isLux = fmt.isLuxury, is4DX = fmt.is4DX, isImax = fmt.isImax;

            // Dimensions
            const w = isLux ? 1.4 : 0.8, d = isLux ? 1.2 : 0.7, h = isLux ? 1.1 : 0.9;
            const spcX = isLux ? 1.8 : 1.0, spcZ = isLux ? 2.5 : 1.2;
            const pitchY = isImax ? 0.65 : (isLux ? 0.3 : 0.4);

            const startZ = -5;
            const centerCol = (fmt.cols - 1) / 2;

            const cSeat = fmt.colorTheme.seat;
            const cBack = is4DX ? 0x111111 : cSeat;

            const matCushion = new THREE.MeshStandardMaterial({ color: cSeat, roughness: 0.7 });
            const matBack = new THREE.MeshStandardMaterial({ color: cBack, roughness: 0.7 });
            const matFrame = new THREE.MeshStandardMaterial({ color: 0x111111 });

            for (let r = 0; r < fmt.rows; r++) {
                for (let c = 0; c < fmt.cols; c++) {
                    let x = (c - centerCol) * spcX;
                    let z = startZ + (r * spcZ);
                    let y = r * pitchY;
                    let rotY = 0;

                    // 4DX Blocks
                    if (is4DX) {
                        const block = Math.floor(c / 4);
                        x += block * 0.8;
                    }

                    // IMAX Curve Math
                    if (isImax) {
                        const offset = Math.abs(c - centerCol);
                        z -= Math.pow(offset, 2) * 0.025;
                        rotY = (centerCol - c) * 0.03;
                    }

                    const sg = new THREE.Group();
                    sg.position.set(x, y, z);
                    if (rotY) sg.rotation.y = rotY;

                    const cushion = new THREE.Mesh(new THREE.BoxGeometry(w, 0.15, d), matCushion);
                    cushion.position.set(0, 0.3, 0); cushion.castShadow = true; sg.add(cushion);

                    const back = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.15), matBack);
                    back.position.set(0, 0.3 + h / 2, d / 2 - 0.07);
                    if (isLux) back.rotation.x = -0.15; // Recline
                    back.castShadow = true; sg.add(back);

                    const armW = 0.15;
                    const armL = new THREE.Mesh(new THREE.BoxGeometry(armW, 0.1, d * 0.9), matFrame);
                    armL.position.set(-w / 2 - armW / 2, 0.5, 0); sg.add(armL);
                    const armR = armL.clone();
                    armR.position.set(w / 2 + armW / 2, 0.5, 0); sg.add(armR);

                    if (isLux) {
                        const tray = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.4), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                        tray.position.set(w / 2 + armW / 2, 0.6, 0.2); sg.add(tray);
                    }

                    const base = new THREE.Mesh(new THREE.BoxGeometry(w * 0.6, 0.3, d * 0.6), matFrame);
                    base.position.set(0, 0.15, 0); sg.add(base);

                    sg.userData = { row: r, col: c, isSeat: true, baseColor: cSeat };
                    cushion.userData = sg.userData; back.userData = sg.userData;

                    scene.add(sg);
                    dynamicMeshes.push(sg, cushion, back, armL, armR, base);
                    seatGroups.push(sg);
                }
            }
        }

        function loadFormat(key) {
            const fmt = FORMATS[key];
            if (!fmt) return;
            currentFmt = fmt;

            // UI Updates
            const badge = document.getElementById('fmtBadge');
            badge.textContent = fmt.id.toUpperCase();
            badge.className = `inline-block border text-xs font-bold px-4 py-1.5 rounded-full tracking-widest mb-2 transition-colors ${fmt.badgeClass}`;
            document.getElementById('fmtInfo').innerHTML = fmt.desc;

            // Environment Lighting Updates
            ambientLight.color.setHex(fmt.colorTheme.ambient);
            ambientLight.intensity = fmt.colorTheme.lightInt;
            screenGlow.color.setHex(fmt.colorTheme.ambient);

            cleanupDynamicMeshes();
            buildScreen(fmt);
            buildSeats(fmt);
            applyVideoToScreens();

            resetToOverview();
        }

        document.getElementById('formatSelect').addEventListener('change', (e) => loadFormat(e.target.value));

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredSeat = null;
        let selectedSeat = null;

        // Control States
        let mode = 'overview';
        let overviewAngles = { th: 0, ph: 0.5 };
        let overviewRadius = 25;
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        let seatViewAngles = { x: 0, y: 0 };

        function getIntersects(event) {
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            return raycaster.intersectObjects(scene.children, true).filter(hit => hit.object.userData && hit.object.userData.isSeat);
        }

        // Spherical dragging in overview, mouse look in seatview
        canvas.addEventListener('mousedown', (e) => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('mouseup', () => { isDragging = false; });
        canvas.addEventListener('mouseleave', () => { isDragging = false; });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging && mode === 'overview') {
                const dx = e.clientX - prevMouse.x;
                const dy = e.clientY - prevMouse.y;
                overviewAngles.th -= dx * 0.005;
                overviewAngles.ph = Math.max(0.1, Math.min(Math.PI / 2 - 0.1, overviewAngles.ph - dy * 0.005));
                prevMouse = { x: e.clientX, y: e.clientY };
            } else if (mode === 'seatview') {
                // True mouse look functionality restored
                seatViewAngles.x = (e.clientX / window.innerWidth - 0.5) * 2;
                seatViewAngles.y = -(e.clientY / window.innerHeight - 0.5);
            }

            // Hover highlighting
            if (mode === 'overview' && !isDragging) {
                const hits = getIntersects(e);
                if (hits.length > 0) {
                    canvas.style.cursor = 'pointer';
                    const rootGroup = hits[0].object.parent;
                    if (hoveredSeat !== rootGroup) {
                        if (hoveredSeat && hoveredSeat !== selectedSeat) resetSeatColor(hoveredSeat);
                        hoveredSeat = rootGroup;
                        if (hoveredSeat !== selectedSeat) highlightSeat(hoveredSeat, 0x38bdf8); // Light blue
                    }
                } else {
                    canvas.style.cursor = 'grab';
                    if (hoveredSeat && hoveredSeat !== selectedSeat) resetSeatColor(hoveredSeat);
                    hoveredSeat = null;
                }
            }
        });

        canvas.addEventListener('wheel', (e) => {
            if (mode === 'overview') overviewRadius = Math.max(10, Math.min(45, overviewRadius + e.deltaY * 0.05));
        });

        canvas.addEventListener('click', (e) => {
            if (mode !== 'overview' || isDragging) return;
            const hits = getIntersects(e);
            if (hits.length > 0) selectSeat(hits[0].object.parent);
            else deselectSeat();
        });

        function highlightSeat(group, hexColor) {
            group.children.forEach(c => {
                if (c.material && c.material.color && c.geometry.type === 'BoxGeometry' && c.position.y > 0.2) {
                    c.material = c.material.clone();
                    c.material.color.setHex(hexColor);
                }
            });
        }

        function resetSeatColor(group) {
            const baseHex = group.userData.baseColor || currentFmt.colorTheme.seat;
            highlightSeat(group, baseHex);
            if (currentFmt.is4DX) group.children[1].material.color.setHex(0x111111); // Restore black 4DX backrest
        }

        function selectSeat(group) {
            if (selectedSeat) resetSeatColor(selectedSeat);
            selectedSeat = group;
            highlightSeat(selectedSeat, 0x10b981); // Emerald Green

            const r = group.userData.row, c = group.userData.col;
            const rowLetter = String.fromCharCode(65 + r);
            const centerCol = (currentFmt.cols - 1) / 2;
            const dist = Math.abs(currentFmt.rows - r) * 3 + 15;
            const angle = Math.round(Math.abs(c - centerCol) * 2);
            let tier = r < currentFmt.rows / 2 ? 'Front' : 'Rear';
            if (currentFmt.isImax) tier = r < 5 ? 'Lower' : 'Upper';

            document.getElementById('seltext').textContent = `ROW ${rowLetter}, SEAT ${c + 1}`;
            document.getElementById('si-dist').textContent = `${dist} ft`;
            document.getElementById('si-angle').textContent = `${angle}°`;
            document.getElementById('si-tier').textContent = tier;

            document.getElementById('selpanel').classList.remove('hidden');
            document.getElementById('hint').style.opacity = '0';
        }

        function deselectSeat() {
            if (selectedSeat) resetSeatColor(selectedSeat);
            selectedSeat = null;
            document.getElementById('selpanel').classList.add('hidden');
            document.getElementById('hint').style.opacity = '1';
        }

        // Smooth transitions into the seat
        document.getElementById('btnview').addEventListener('click', () => {
            if (!selectedSeat) return;
            mode = 'animating_in';
            document.getElementById('selpanel').classList.add('hidden');

            const ml = document.getElementById('modeLabel');
            ml.textContent = 'SEAT VIEW';
            ml.className = "glass-panel text-green-400 text-xs px-3 py-1 rounded-full uppercase tracking-widest font-bold border border-green-500/40 shadow-[0_0_15px_rgba(34,197,94,0.3)] transition-all";

            document.getElementById('formatSelect').parentElement.classList.add('hidden');

            // Calculate Eye Position (Accurate to recliner vs standard height)
            const seatPos = selectedSeat.position;
            const eyeY = seatPos.y + (currentFmt.isLuxury ? 1.0 : 1.25);
            const eyeZ = seatPos.z + 0.3;

            targetCamPos.set(seatPos.x, eyeY, eyeZ);
            targetCamLook.set(0, currentFmt.screenH / 2 + 1.5, -14); // Look at screen center

            setTimeout(() => {
                mode = 'seatview';
                document.getElementById('backbtn').classList.remove('hidden');
                document.getElementById('formatSelect').parentElement.classList.remove('hidden');
                document.getElementById('formatSelect').classList.add('hidden');
            }, 1200); // Allow time for continuous lerp to reach target
        });

        function resetToOverview() {
            mode = 'animating_out';
            deselectSeat();
            document.getElementById('backbtn').classList.add('hidden');
            document.getElementById('formatSelect').classList.remove('hidden');

            const ml = document.getElementById('modeLabel');
            ml.textContent = 'OVERVIEW';
            ml.className = "glass-panel text-white/80 text-xs px-3 py-1 rounded-full uppercase tracking-widest font-semibold border border-white/20 transition-all";

            seatViewAngles = { x: 0, y: 0 };
            setTimeout(() => { mode = 'overview'; }, 1200);
        }

        document.getElementById('backbtn').addEventListener('click', resetToOverview);

        const clock = new THREE.Clock();
        const lookAtTracker = new THREE.Vector3(0, 5, -10);

        function render() {
            requestAnimationFrame(render);
            if (vt && !videoEl.paused) vt.needsUpdate = true;

            if (mode === 'overview' || mode === 'animating_out') {
                // Orbital math
                const camX = overviewRadius * Math.sin(overviewAngles.th) * Math.cos(overviewAngles.ph);
                const camY = overviewRadius * Math.sin(overviewAngles.ph) + 5;
                const camZ = overviewRadius * Math.cos(overviewAngles.th) * Math.cos(overviewAngles.ph);

                targetCamPos.set(camX, camY, camZ);
                targetCamLook.set(0, 4, -5);
            }
            else if (mode === 'seatview' && selectedSeat && selectedSeat.position) {
                // Mouse look logic offset from screen center
                const lookX = seatViewAngles.x * 20;
                const lookY = (currentFmt.screenH / 2 + 1.5) + (seatViewAngles.y * 15);
                targetCamLook.set(lookX, lookY, -14);
            }

            // CORE FIX: Restoring the buttery smooth continuous lerp
            camera.position.lerp(targetCamPos, 0.05); // Smooth glide to position
            lookAtTracker.lerp(targetCamLook, 0.05); // Smooth glide to look target
            camera.lookAt(lookAtTracker);

            renderer.render(scene, camera);
        }

        // Initialize System
        loadFormat('standard');
        render();
    </script>
</body>

</html>
